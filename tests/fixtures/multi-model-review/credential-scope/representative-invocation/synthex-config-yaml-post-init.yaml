# .synthex/config.yaml — generated by `synthex init`
# Edit this file to configure multi-model review for your project.
# See docs/specs/multi-model-review/ for full configuration reference.
#
# IMPORTANT: Synthex uses CLI-based external reviewers only. Authentication
# is handled by each CLI tool independently (e.g., `codex login`, `gemini auth`).
# Do NOT add API keys or tokens here — Synthex never reads them from config.

multi_model_review:
  enabled: true

  # Minimum number of distinct LLM families required across configured proposers.
  # Synthex will warn (but not block) if this threshold is not met.
  min_family_diversity: 2

  # Minimum proposers that must pass preflight for the review to proceed.
  min_proposers_to_proceed: 2

  # Include native Synthex reviewers (code-reviewer, security-reviewer) as proposers.
  include_native_reviewers: true

  # External CLI-based reviewer adapters.
  # Uncomment and configure the adapters whose CLIs are installed on this host.
  reviewers:
    - codex-review-prompter
    - gemini-review-prompter
  # - ollama-review-prompter

  aggregator:
    # 'auto' selects the highest-tier flagship model from the D17 tier table.
    # Set to a specific adapter name to pin the aggregator.
    command: auto

  consolidation:
    # Jaccard similarity threshold for Stage 2 lexical dedup (0.0–1.0).
    stage2_jaccard_threshold: 0.8
    stage4:
      # Maximum LLM tiebreaker calls per consolidation run (D18 bound).
      max_calls_per_consolidation: 25

  per_command:
    review_code:
      enabled: true
      complexity_gate:
        # Multi-model fires when EITHER threshold is exceeded.
        threshold_lines_changed: 50
        threshold_files_touched: 3
        # Paths that always trigger multi-model regardless of diff size.
        always_escalate_paths:
          - "**/auth/**"
          - "**/payments/**"
          - "**/billing/**"
          - "**/migrations/**"
          - "**/security/**"
          - "**/secrets/**"
          - "**/crypto/**"

  audit:
    enabled: true
    # Directory where audit markdown files are written.
    output_path: "docs/reviews/"
    # Directory where raw CLI output JSON files are written.
    raw_output_path: "docs/reviews/raw/"
